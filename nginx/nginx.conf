# ─────────────────────────────────────────────────────────────────────────────
# Nginx reverse-proxy for Gym Master API
#
# Responsibilities:
#  • TLS termination (certificates managed by Certbot / Let's Encrypt)
#  • Enforce HTTPS — redirect all HTTP traffic to HTTPS
#  • Security headers (HSTS, X-Frame-Options, etc.)
#  • Connection-level rate limiting (DDoS mitigation before the app sees the request)
#  • Proxy to the Node.js API container
#  • Serve Let's Encrypt ACME challenge files from disk
#
# PCI DSS note: TLS 1.0 and 1.1 are explicitly disabled (requirement 4.1).
#               Only TLS 1.2+ is accepted.
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Logging ──────────────────────────────────────────────────────────────
  # Custom format includes request id for correlation with application logs.
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time rid=$http_x_request_id';

  access_log /var/log/nginx/access.log main;

  sendfile       on;
  tcp_nopush     on;
  tcp_nodelay    on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  server_tokens off;     # hide nginx version

  # ── Rate limiting ─────────────────────────────────────────────────────────
  # 30 requests/second per IP for general API traffic.
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
  # 5 requests/minute per IP for authentication endpoints.
  limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
  # Payment endpoints: 10 requests/minute per IP.
  limit_req_zone $binary_remote_addr zone=payment_limit:10m rate=10r/m;

  limit_req_status 429;

  # ── Gzip compression ──────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 4;
  gzip_types text/plain application/json application/javascript text/css;

  # ── Upstream — the Node.js API container ─────────────────────────────────
  upstream gymmaster_api {
    server api:5000;
    keepalive 32;
  }

  # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge — must be HTTP
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS ─────────────────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name api.gymmaster.app;   # <-- replace with your domain

    # ── TLS (PCI DSS 4.1 compliant) ────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ── Security headers ────────────────────────────────────────────────────
    # HSTS: force HTTPS for 1 year (PCI DSS 6.5.10)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                     always;
    add_header X-Frame-Options           "DENY"                                        always;
    add_header X-XSS-Protection          "1; mode=block"                               always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"             always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"   always;
    add_header Content-Security-Policy
      "default-src 'self'; script-src 'self' https://checkout.razorpay.com; connect-src 'self' https://api.razorpay.com; frame-src https://api.razorpay.com;"
      always;

    # Remove server info headers (belt + braces with server_tokens off)
    more_clear_headers Server;

    # ── Request size limits ─────────────────────────────────────────────────
    client_max_body_size 1m;
    client_body_timeout  12;
    client_header_timeout 12;
    send_timeout 10;

    # ── Rate limiting ───────────────────────────────────────────────────────
    location /api/v1/auth/ {
      limit_req zone=auth_limit burst=3 nodelay;
      proxy_pass http://gymmaster_api;
      include /etc/nginx/proxy_params;
    }

    location ~ ^/api/v1/gateway/(razorpay|stripe)/(order|verify) {
      limit_req zone=payment_limit burst=5 nodelay;
      proxy_pass http://gymmaster_api;
      include /etc/nginx/proxy_params;
    }

    # Webhook endpoints — no rate limiting (Razorpay/Stripe have fixed IPs)
    location ~ ^/api/v1/gateway/(razorpay|stripe)/webhook {
      proxy_pass http://gymmaster_api;
      include /etc/nginx/proxy_params;
      # Forward the raw body unchanged (crucial for signature verification)
      proxy_request_buffering off;
    }

    location /api/ {
      limit_req zone=api_limit burst=60 nodelay;
      proxy_pass http://gymmaster_api;
      include /etc/nginx/proxy_params;
    }

    # Health check — no rate limiting, no logging
    location /api/v1/health {
      access_log off;
      proxy_pass http://gymmaster_api;
      include /etc/nginx/proxy_params;
    }

    # Deny access to hidden files
    location ~ /\. {
      deny all;
    }
  }
}
